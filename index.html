<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<title>Trigonometrispil – Aflæsning på enhedscirklen</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background:#f5f5f5;
        text-align:center;
    }

    #gameContainer {
        width: 800px;
        margin: auto;
        background:white;
        padding:20px;
        border-radius:10px;
        box-shadow: 0 0 10px #ccc;
    }

    canvas {
        background:#fff;
        border:1px solid #ccc;
        margin:20px 0;
    }

    input {
        padding:8px;
        font-size:16px;
        width:120px;
    }

    button {
        padding:10px 20px;

    }

    #feedback {

</head>

        <input id="userValue" type="number" step="0.01">

    </div>

    <p id="feedback"></p>
    <p id="scoreInfo"></p>

    <button id="startBtn" onclick="startGame()">Start spil</button>
</div>
